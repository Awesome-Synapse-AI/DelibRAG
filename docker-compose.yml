version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delibrag}
      POSTGRES_USER: ${POSTGRES_USER:-delib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delibpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-delib}:${POSTGRES_PASSWORD:-delibpass}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-delibrag}
      - JWT_SECRET=${JWT_SECRET:-changeme}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
