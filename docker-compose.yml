version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delibrag}
      POSTGRES_USER: ${POSTGRES_USER:-delib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delibpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-delib}:${POSTGRES_PASSWORD:-delibpass}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-delibrag}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=delibrag
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
    ports:
      - "8000:8000"
    depends_on:
      - db
      - qdrant
      - mongo

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
    volumes:
      - ./infra/qdrant:/qdrant/storage

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db


volumes:
  postgres_data:
  qdrant_data:
  mongo_data:
